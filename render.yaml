services:
  - type: web
    name: dairy-erp-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && node migrate.js
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 3000
